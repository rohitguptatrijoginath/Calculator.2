name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config \
          zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev \
          libssl-dev python3-dev build-essential libsqlite3-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Build APK
        run: buildozer android debug
        env:
          ANDROIDAPI: 31
          NDKAPI: 21
          BUILDOZER_ALLOW_ORG_NAME_START: 1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Advanced-Calculator-X
          path: bin/*.apk
