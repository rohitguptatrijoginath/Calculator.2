name: Build Advanced Calculator X APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
          python3-dev python3-pip build-essential libsqlite3-dev sqlite3 \
          bzip2 libbz2-dev liblzma-dev libreadline-dev uuid-dev libgdbm-dev \
          tk-dev libdb5.3-dev libexpat1-dev libmpdec-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33 buildozer

      - name: Clean Build
        run: buildozer android clean

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Advanced-Calculator-X
          path: bin/*.apk
